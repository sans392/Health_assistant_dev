<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Assistant — Chat</title>
  <link rel="stylesheet" href="/static/css/chat.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Health Assistant</h2>
      <p>Тестовый чат</p>
    </div>
    <div class="sidebar-controls">
      <div>
        <label for="user-id-input">User ID</label>
        <input id="user-id-input" type="text" value="user_1" placeholder="user_1">
      </div>
      <button id="new-session-btn" class="btn btn-primary btn-full">+ Новая сессия</button>
    </div>
    <div id="sessions-list" class="sessions-list"></div>
    <div style="padding:12px 16px;border-top:1px solid var(--border)">
      <a href="/admin" style="font-size:12px;color:var(--text-muted);text-decoration:none;">⚙ Admin Panel</a>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="topbar">
      <span class="topbar-title">Чат</span>
      <div class="topbar-actions">
        <button id="toggle-debug" class="btn btn-ghost btn-sm">🔍 Debug</button>
        <button id="reconnect-btn" class="btn btn-ghost btn-sm hidden">↺ Переподключиться</button>
        <span id="conn-badge" class="conn-badge disconnected">
          <span class="dot"></span>Отключено
        </span>
      </div>
    </div>

    <!-- Stage indicator -->
    <div id="stage-indicator" class="stage-indicator hidden">
      <div id="stage-text"></div>
    </div>

    <div id="messages" class="messages-container"></div>

    <!-- Debug panel -->
    <div id="debug-panel" class="debug-panel hidden">
      <div class="debug-inner">
        <h4>Pipeline Debug — последний ответ</h4>
        <div id="debug-content"><span style="color:var(--text-muted)">Нет данных</span></div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="presets-wrap">
        <button id="presets-btn" class="btn btn-ghost btn-sm">📋 Примеры ▾</button>
        <div id="presets-menu" class="presets-menu hidden"></div>
      </div>
      <div class="input-row">
        <div class="input-wrap">
          <textarea id="msg-input" placeholder="Напишите сообщение… (Enter — отправить, Shift+Enter — новая строка)" rows="1"></textarea>
        </div>
        <button id="send-btn" disabled title="Отправить">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter — отправить &nbsp;·&nbsp; Shift+Enter — перенос строки</div>
    </div>
  </main>
</div>
<script src="/static/js/chat.js"></script>
</body>
</html>
